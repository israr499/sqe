# .github/workflows/ci.yml
# Continuous Testing Pipeline – Assignment #04
# Software Quality Engineering (SEN 321) – Bahria University Karachi

name: Continuous Testing Pipeline

# Trigger: Run on every push to main/develop and on PRs targeting main
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run Automated Test Suite
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x] # Test on multiple Node.js versions

    steps:
      # Step 1: Checkout the repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up the specified Node.js version
      - name: Set Up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      # Step 3: Install project dependencies
      - name: Install Dependencies
        run: npm ci

      # Step 4: Run Jest test suite with coverage reporting
      - name: Run Tests with Coverage
        run: npm test -- --coverage --coverageReporters=text --coverageReporters=lcov

      # Step 5: Upload coverage report as a workflow artifact
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always() # Upload even if tests fail
        with:
          name: coverage-report-node-${{ matrix.node-version }}
          path: coverage/
          retention-days: 7

  # Quality Gate: Block merges if tests fail
  quality-gate:
    name: Quality Gate Check
    runs-on: ubuntu-latest
    needs: test # Only runs after the test job completes

    steps:
      - name: Quality Gate Passed
        run: echo "All tests passed. Quality gate cleared. Safe to merge."
