name: Continuous Testing Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Run Automated Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npx --yes jest --coverage